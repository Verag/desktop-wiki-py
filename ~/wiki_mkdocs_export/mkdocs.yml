site_name: "Wiki Pessoal 2026"
    site_author: "Your Name"
    site_description: "Personal wiki exported on 2026-03"
    # repo_url: ""  # optional - uncomment and fill if you want edit links

    theme:
    name: material
    palette:
        - scheme: default
        primary: indigo
        accent: indigo
        toggle:
            icon: material/weather-sunny
            name: Switch to dark mode
        - scheme: slate
        toggle:
            icon: material/weather-night
            name: Switch to light mode
    features:
        - navigation.sections
        - navigation.tracking
        - navigation.expand
        - navigation.indexes
        - navigation.top
        - search.suggest
        - search.highlight
        - content.code.copy
        - content.code.annotate
        - toc.integrate

    markdown_extensions:
    - pymdownx.highlight:
        anchor_linenums: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences
    - pymdownx.tasklist:
        custom_checkbox: true
    - admonition
    - footnotes
    - attr_list
    - md_in_html
    - toc:
        permalink: true
    - pymdownx.emoji:
        emoji_index: !!python/name:material.extensions.emoji.twemoji
        emoji_generator: !!python/name:material.extensions.emoji.to_svg

    plugins:
    - search
    # - glightbox  # uncomment after `pip install mkdocs-glightbox`

    nav:
        - Cria O De Ambientes: cria-o-de-ambientes.md
    - Inser O De Informa O: inser-o-de-informa-o.md
    - Introdu O: introdu-o.md